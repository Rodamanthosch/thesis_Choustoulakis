# ============================================================
# JiT-S2-VMamba (SS2D) on CIFAR-10 — baseline, no CFG
# ============================================================

experiment:
  name: jit-s2-vmamba-cifar10-baseline
  model: vmamba         # jit | vim | vmamba
  dataset: cifar10
  seed: 42

model:
  input_size: 32
  patch_size: 2
  in_channels: 3
  hidden_size: 384
  depth: 12
  num_heads: 6          # unused by vmamba, kept for parity
  mlp_ratio: 4.0
  bottleneck_dim: 128
  num_classes: 10
  attn_drop: 0.0
  proj_drop: 0.0
  # SS2D knobs
  d_state: 16
  d_conv: 3
  expand: 1
  K: 4                  # number of CrossScan directions

training:
  epochs: 200
  batch_size: 128
  warmup_epochs: 5
  blr: 5.0e-5
  optimizer: adamw
  betas: [0.9, 0.95]
  weight_decay: 0.0
  ema_decay1: 0.9999
  ema_decay2: 0.9996
  amp: true

diffusion:
  P_mean: -0.8
  P_std: 0.8
  t_eps: 0.05
  noise_scale: 1.0

cfg:
  label_drop_prob: 0.0
  cfg_scale: 1.0
  cfg_interval: [0.0, 1.0]

sampling:
  method: heun
  steps: 50

checkpoint:
  save_last_freq: 5
  save_archive_freq: 25
  resume_from: null
  output_dir: experiments/cifar10/jit-s2-vmamba-baseline
