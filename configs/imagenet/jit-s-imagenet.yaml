# configs/imagenet/jit-s-imagenet.yaml
# JiT-S on ImageNet 256x256

experiment:
  name: jit-s-imagenet-baseline
  dataset: imagenet
  resolution: 256
  seed: 42

model:
  arch: jit-s
  depth: 12
  hidden_dim: 384
  heads: 6
  patch_size: 16           # 256/16 = 16x16 sequence
  in_context_tokens: 32
  bottleneck_dim: 128
  dropout: 0.0

training:
  epochs: 600
  batch_size: 1024
  lr: 2.0e-4
  optimizer: adam
  betas: [0.9, 0.95]
  weight_decay: 0.0
  warmup_epochs: 5
  ema_decay: [0.9996, 0.9998, 0.9999]   # maintain 3 copies

diffusion:
  prediction: x_pred
  loss: v_loss
  time_sampler: logit_normal
  time_mu: -0.8
  time_sigma: 0.8
  noise_scale: 1.0          # scaled by image_size / 256
  cfg_drop_prob: 0.1

sampling:
  ode_solver: heun
  ode_steps: 50
  cfg_scale: 2.5            # sweep [1.0, 4.0] at eval
  cfg_interval: [0.1, 1.0]
  batch_size: 16

logging:
  save_every: 50
  sample_every: 50
  output_dir: experiments/imagenet/jit-s-baseline
